{% load static %}
<!DOCTYPE html>
<html lang="en" class="light">
<head>
<script>
(function(){
  var t=localStorage.getItem('nux_theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  var h=document.documentElement;
  h.classList.toggle('dark',t==='dark');
  h.classList.toggle('light',t!=='dark');
  window._nuxTheme=t;
  window._nuxSetTheme=function(t){
    window._nuxTheme=t;
    localStorage.setItem('nux_theme',t);
    h.classList.toggle('dark',t==='dark');
    h.classList.toggle('light',t!=='dark');
  };
})();
</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Forgot Password – Novelux</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:hsl(0 0% 100%);--fg:hsl(0 0% 9%);
  --primary:hsl(14 62% 38%);--primary-fg:#fff;
  --muted:hsl(0 0% 96%);--muted-fg:hsl(0 0% 45%);
  --border:hsl(0 0% 90%);--danger:hsl(0 68% 50%);
  --success:hsl(142 60% 40%);
}
html.dark{
  --bg:hsl(240 6% 6%);--fg:hsl(0 0% 90%);
  --muted:hsl(240 4% 14%);--muted-fg:hsl(0 0% 50%);
  --border:hsl(240 4% 26%);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Geist',-apple-system,sans-serif;font-size:14px;
  background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;
  display:flex;align-items:flex-start;justify-content:center;
  min-height:100vh;padding:48px 24px 40px;
}
a{text-decoration:none;color:var(--primary);}
button{cursor:pointer;font-family:inherit;border:none;background:none;}

.wrap{width:100%;max-width:400px;}

.card{border:1px solid var(--border);padding:36px 28px;background:var(--bg);position:relative;overflow:hidden;}
.card::before{
  content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(-45deg,transparent,transparent 8px,
    color-mix(in srgb,var(--fg) 2%,transparent) 8px,
    color-mix(in srgb,var(--fg) 2%,transparent) 9px);
  pointer-events:none;
}
.card>*{position:relative;z-index:1;}
@media(max-width:480px){.card{padding:24px 16px;}}

.brand{display:flex;align-items:center;gap:8px;margin-bottom:28px;}
.brand-logo{width:22px;height:22px;border-radius:22%;background:var(--primary);display:flex;align-items:center;justify-content:center;}
.brand span{font-size:14px;font-weight:700;letter-spacing:.04em;}

h1{font-size:20px;font-weight:600;letter-spacing:-.02em;margin-bottom:6px;}
.sub{font-size:13px;color:var(--muted-fg);margin-bottom:24px;line-height:1.6;}

.form-group{margin-bottom:16px;}
label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-fg);margin-bottom:6px;}
input{
  width:100%;padding:10px 12px;font-size:14px;font-family:inherit;
  border:1px solid var(--border);background:var(--bg);color:var(--fg);outline:none;
  transition:border-color .15s;
}
input:focus{border-color:var(--primary);}
input.err{border-color:var(--danger);}

.err-banner{
  display:none;
  background:color-mix(in srgb,var(--danger) 8%,transparent);
  border:1px solid color-mix(in srgb,var(--danger) 25%,transparent);
  color:var(--danger);padding:10px 14px;font-size:13px;margin-bottom:16px;
}
.err-banner.show{display:block;}

.ok-banner{
  display:none;
  background:color-mix(in srgb,var(--success) 8%,transparent);
  border:1px solid color-mix(in srgb,var(--success) 30%,transparent);
  color:var(--success);padding:14px 16px;font-size:13px;margin-bottom:16px;line-height:1.6;
}
.ok-banner.show{display:block;}

.btn-submit{
  width:100%;padding:12px 16px;font-size:14px;font-weight:600;
  background:var(--primary);color:var(--primary-fg);
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .15s;
}
.btn-submit:hover{opacity:.88;}
.btn-submit:disabled{opacity:.45;cursor:not-allowed;}

.footer-link{margin-top:16px;text-align:center;font-size:12px;color:var(--muted-fg);}
.footer-link a{color:var(--primary);font-weight:500;}

.theme-btn{
  position:fixed;top:16px;right:16px;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  color:var(--muted-fg);cursor:pointer;border:1px solid var(--border);background:var(--bg);
}
.ic-sun,.ic-moon{position:absolute;width:15px;height:15px;transition:opacity .2s,transform .2s;}
html.light .ic-sun{opacity:1;transform:scale(1);}html.light .ic-moon{opacity:0;transform:scale(0);}
html.dark  .ic-sun{opacity:0;transform:scale(0);}html.dark  .ic-moon{opacity:1;transform:scale(1);}
</style>
</head>
<body>

<button class="theme-btn" id="themeBtn" style="position:relative;" onclick="window._nuxSetTheme(window._nuxTheme==='dark'?'light':'dark')">
  <svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
  <svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<div class="wrap">
  <div class="card">
    <div class="brand">
      <div class="brand-logo">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      </div>
      <span>Novelux</span>
    </div>

    <h1>Forgot your password?</h1>
    <p class="sub">Enter the email address for your account and we'll send you a reset link.</p>

    <div class="err-banner" id="errBanner"></div>
    <div class="ok-banner" id="okBanner"></div>

    <div id="formArea">
      <div class="form-group">
        <label>Email <span style="color:var(--danger)">*</span></label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required/>
      </div>

      <button class="btn-submit" id="submitBtn" onclick="doForgot()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.62 3.42 2 2 0 0 1 3.6 1.24h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.85a16 16 0 0 0 6 6l1.17-.97a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        Send Reset Link
      </button>
    </div>

    <p class="footer-link"><a href="/login/">← Back to sign in</a></p>
  </div>
</div>

<script>
function showErr(msg) {
  const el = document.getElementById('errBanner');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('okBanner').classList.remove('show');
}
function showOk(msg) {
  const el = document.getElementById('okBanner');
  el.innerHTML = msg;
  el.classList.add('show');
  document.getElementById('errBanner').classList.remove('show');
  // Hide the form so user can't re-submit accidentally
  document.getElementById('formArea').style.display = 'none';
}

async function doForgot() {
  const email = document.getElementById('email').value.trim();
  if (!email || !email.includes('@')) {
    showErr('Please enter a valid email address.');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Sending…';

  try {
    const res  = await fetch('/auth/forgot-password/', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email }),
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      showOk(
        '<strong>Check your inbox!</strong><br>' +
        'If an account exists for <strong>' + email + '</strong>, ' +
        'we\'ve sent a password reset link. It may take a minute to arrive — check your spam folder too.'
      );
    } else {
      showErr(data.error || 'Something went wrong. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Send Reset Link';
    }
  } catch(e) {
    showErr('Network error — please try again.');
    btn.disabled = false;
    btn.textContent = 'Send Reset Link';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doForgot();
});
</script>
</body>
</html>
